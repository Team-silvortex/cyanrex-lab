services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyanrex
    ports:
      - "15432:5432"
    volumes:
      - cyanrex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyanrex"]
      interval: 5s
      timeout: 5s
      retries: 20

  engine:
    build:
      context: ../engine
      dockerfile: Dockerfile
    container_name: cyanrex-engine
    restart: unless-stopped
    environment:
      ENGINE_HOST: 0.0.0.0
      ENGINE_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cyanrex
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cyanrex-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_ENGINE_URL: http://localhost:8080
    depends_on:
      engine:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  cyanrex-postgres-data:
